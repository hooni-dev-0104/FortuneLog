name: Mobile App CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-analyze:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --reporter expanded

      - name: Build Android APK (PR gate)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      - name: Create ephemeral Android signing config
        if: github.event_name == 'pull_request'
        working-directory: apps/mobile/android
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore ci-upload-keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=FortuneLog CI, OU=CI, O=FortuneLog, L=Seoul, S=Seoul, C=KR"
          cat > key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=upload
          storeFile=ci-upload-keystore.jks
          EOF

      - name: Build Android Release APK (signing gate)
        if: github.event_name == 'pull_request'
        run: flutter build apk --release
