name: Engine API Test

on:
  push:
    branches: [ main ]
    paths:
      - 'services/engine-api/**'
      - '.github/workflows/engine-test.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'services/engine-api/**'
      - '.github/workflows/engine-test.yml'

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: services/engine-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests (and PR assemble gate)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew test assemble --no-daemon
          else
            ./gradlew test --no-daemon
          fi
